<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> <!-- Impede zoom -->
    <title>Marketplace de Profissionais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Área de Seleção de Serviço -->
    <header>
        <h1>Selecione um Serviço</h1>
        <select id="service-select">
            <option value="" selected disabled>Escolha um serviço</option>
            <option value="pedreiro">Pedreiro 🧱🔨</option>
            <option value="servente">Servente 🏗️</option>
            <option value="bombeiro-hidraulico">Bombeiro Hidráulico 🔧💧</option>
            <option value="pintor">Pintor 🎨🖌️</option>
            <option value="capinador">Capinador 🌿</option>
            <option value="eletricista">Eletricista ⚡🔌</option>
            <option value="montador-de-moveis">Montador de Móveis 🛠️</option>
            <option value="caminhao-de-frete">Caminhão de Frete 🚚</option>
            <option value="diarista">Diarista 🧹</option>
        </select>
        <button id="confirm-service">Continuar</button>
    </header>

    <!-- Área de Cards dos Profissionais -->
    <main class="grid-container"></main>

    <script src="services.js"></script>

</body>
</html>
