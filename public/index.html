<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"> <!-- Bloqueia zoom -->
    <title>Auza Services</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script> <!-- Script atualizado -->
</head>
<body>

    <header>
        <h1 class="title">Auza Services</h1>
        <p class="slogan">Tudo em serviços de A a Z</p>
    </header>
    
    <main>
        <div class="form-container">
            <h2 class="question">Qual serviço você precisa?</h2>
            <form id="service-form">
                <select name="services" id="services">
                    <option value="">Selecione</option>
                    <option value="marido-de-aluguel">🏠 Marido de Aluguel</option> 
                    <option value="arquiteto">📐 Arquiteto(a)</option>
                    <option value="pedreiro">🧱 Pedreiro</option>
                    <option value="servente">🏗️ Servente</option>
                    <option value="bombeiro-hidraulico">💧 Bombeiro Hidráulico</option>
                    <option value="metalurgico">⚙️ Metalúrgico</option>
                    <option value="pintor">🎨 Pintor</option>
                    <option value="capinador">🌿 Capinador</option>
                    <option value="eletricista">⚡Eletricista</option>
                    <option value="vidraceiro">🪟 Vidraceiro</option>
                    <option value="piscineiro">🏊‍♂️ Piscineiro (Limpador de Piscinas)</option>
                    <option value="tec-em-refrigeracao">❄️ Tec. em Refrigeração</option>
                    <option value="tec-de-cercas-eletricas">🔧 Tec. de Cerca Elétrica</option>
                    <option value="montador-de-moveis">🛠️ Montador de Móveis</option>
                    <option value="marceneiro">🪚 Marceneiro</option>
                    <option value="mudanças-e-carretos">🚚 Mudanças e Carretos</option>
                    <option value="diarista">🧹 Diarista</option>
                    <option value="baba">🍼 Babás</option>
                    <option value="cuidador-de-idosos">❤️ Cuidador(a) de Idosos</option>
                    <option value="churrasqueiro">🔥 Churrasqueiro</option>
                    <option value="bartender">🍸  Bartender</option>
                    <option value="cabeleireiro-a-domicilio">💇‍♂️ Cabeleireiro a Domicilio</option>
                    <option value="manicure-a-domicilio">💅 Manicure a Domicilio</option>
                    <option value="designer">🖥️ Designer</option>
                    <option value="fotógrafo">📸 Fotógrafo(a)</option>
                    <option value="dj">🎶 DJ's</option>
                    <option value="adestramento">🦴 Adestramento</option>
                    <option value="cuidador-de-animais">🐶 Cuidador(a) de Animais</option>
                    <option value="advogado">⚖️ Advogado(a)</option>
                    <option value="psicologo">🧠 Psicólogo(a)</option> 
                    <option value="nutricionista">🥑 Nutricionista</option>
                    <option value="personal-trainer">💪 Personal Trainer</option>


                </select>
                <button type="submit">Continuar</button>
            </form>
        </div>
    
        <div style="text-align: center; margin-top: -25px; margin-left: -85px; margin-right: 0;">
            <button id="joinButton" style="background-color: #ffffff; color: rgb(0, 0, 0); padding: 10px 20px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; box-shadow: 3px 3px 6px rgba(0, 0, 0, 0.3);">
                Junte-se a Nós
            </button>
        </div>
    </main>

    <footer>
        <p>© 2025 Auza Services. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
