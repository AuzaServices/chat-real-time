<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#222429" />
    <title>Auza Services</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Nome e Slogan -->
    <header style="margin-top: 50px; margin-bottom: -41px;">
        <h1 style="color: darkred; font-weight: bold;">Auza Services</h1>
        <p style="font-weight: normal; font-size: 1rem;">Tudo em Serviços de A a Z</p>
    </header>

    <!-- Container Principal -->
    <main id="service-selector">
        <h2 style="margin-bottom: 8px; font-weight: bold; font-size: 1.2rem; white-space: nowrap; margin-top: 85px;">Qual serviço você está precisando?</h2>
        <form>
            <select name="services" id="services" style="margin-top: 20px;" onchange="handleServiceSelection(event)">
                <option value="">Selecione</option>
                <option value="Pedreiro">Pedreiro</option>
                <option value="Pintor">Pintor</option>
                <option value="Eletricista">Eletricista</option>
                <option value="Montador de Móveis">Montador de Móveis</option>
                <option value="Caminhão de Frete">Caminhão de Frete</option>
                <option value="Diarista">Diarista</option>
                <option value="Servente">Servente</option>
                <option value="Bombeiro Hidráulico">Bombeiro Hidráulico</option>
                <option value="Outro">Outro</option>
            </select>
            <div id="custom-service-container" style="margin-top: 20px; display: none;">
                <input type="text" id="custom-service" placeholder="Digite o serviço necessário..." style="width: 80%; height: 40px; border-radius: 5px; border: 1px solid #646464; padding: 5px; background: #444; color: #fff;">
            </div>
            <button type="submit" style="margin-top: 30px;">Confirmar</button>
        </form>
    </main>

       <!-- Rodapé -->
       <footer style="margin-top: 30px; text-align: center; font-size: 0.9rem; color: #232323;">
        <p>Auza Services © 2025</p>
    </footer>

    <script>
        function handleServiceSelection(event) {
            const selectedValue = event.target.value;
            const customServiceContainer = document.getElementById('custom-service-container');

            if (selectedValue === 'Outro') {
                customServiceContainer.style.display = 'block'; // Mostra o campo para digitar o serviço
            } else {
                customServiceContainer.style.display = 'none'; // Esconde o campo se "Outro" não for selecionado
            }
        }
    </script>
</body>
