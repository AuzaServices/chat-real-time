<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerenciamento de Sessão</title>
</head>
<body>
    <script>
        // Simulação de login bem-sucedido: Armazenar o estado de login
        function login() {
            sessionStorage.setItem('user', 'loggedIn');
            alert('Login bem-sucedido');
        }

        // Verificar o estado de login ao carregar a página
        window.onload = function() {
            if (!sessionStorage.getItem('user')) {
                // Se não houver dados de usuário, redireciona para a página de login
                window.location = '/login';
            }
        };

        // Limpar o estado de login ao sair
        function logout() {
            sessionStorage.removeItem('user');
            alert('Dados limpos');
            window.location = '/login';
        }
    </script>

    <h1>Gerenciamento de Sessão</h1>
    <button onclick="login()">Login</button>
    <button onclick="logout()">Logout</button>
</body>
</html>
