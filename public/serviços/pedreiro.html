<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedreiros - Auza Services</title>
    <link rel="stylesheet" href="css/profissionais.css">

    <!-- Meta tags para compartilhamento -->
    <meta property="og:title" content="Pedreiros - Auza Services">
    <meta property="og:description" content="Confira todos os pedreiros disponíveis para sua obra!">
    <meta property="og:image" content="https://i.imgur.com/pedreiro.png"> <!-- Substitua pela imagem do serviço -->
    <meta property="og:url" content="https://clientes2.onrender.com/pedreiro-profissionais.html">
    <meta property="og:type" content="website">
</head>
<body>
    <h1>Todos os Pedreiros Disponíveis</h1>

    <div class="profissionais-container">
        <p>Veja a lista de pedreiros prontos para atender sua necessidade.</p>
    </div>

    <div class="button-container">
        <button id="shareButton">Compartilhar</button>
        <button id="backButton">Voltar</button>
    </div>

    <script>
        document.getElementById("shareButton").addEventListener("click", function () {
            const url = encodeURIComponent(window.location.href);
            const mensagem = encodeURIComponent("Confira a lista de pedreiros disponíveis!");
            window.open(`https://api.whatsapp.com/send?text=${mensagem} ${url}`, "_blank");
        });

        document.getElementById("backButton").addEventListener("click", function () {
            window.location.href = "index.html";
        });
    </script>
</body>
</html>
