<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cadastro de Profissional</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

<div class="container">
    <div class="header-container">
        <h1>Cadastro de Profissional</h1>
        <button id="back-button" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <form id="cadastro-form">
        <label for="nome">Nome e Sobrenome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" required>

        <label for="estado">Estado:</label>
<select id="estado" name="estado" onchange="atualizarCidades()" required>
    <option value="" disabled selected>Selecione o estado</option>
    <option value="AC">Acre</option>
    <option value="AL">Alagoas</option>
    <option value="AP">Amapá</option>
    <option value="AM">Amazonas</option>
    <option value="BA">Bahia</option>
    <option value="CE">Ceará</option>
    <option value="DF">Distrito Federal</option>
    <option value="ES">Espírito Santo</option>
    <option value="GO">Goiás</option>
    <option value="MA">Maranhão</option>
    <option value="MT">Mato Grosso</option>
    <option value="MS">Mato Grosso do Sul</option>
    <option value="MG">Minas Gerais</option>
    <option value="PA">Pará</option>
    <option value="PB">Paraíba</option>
    <option value="PR">Paraná</option>
    <option value="PE">Pernambuco</option>
    <option value="PI">Piauí</option>
    <option value="RJ">Rio de Janeiro</option>
    <option value="RN">Rio Grande do Norte</option>
    <option value="RS">Rio Grande do Sul</option>
    <option value="RO">Rondônia</option>
    <option value="RR">Roraima</option>
    <option value="SC">Santa Catarina</option>
    <option value="SP">São Paulo</option>
    <option value="SE">Sergipe</option>
    <option value="TO">Tocantins</option>
</select>

        <label for="cidade">Cidade:</label>
        <select id="cidade" name="cidade" required>
            <option value="" disabled selected>Selecione a cidade</option>
        </select>

        <label for="experiencia">Experiência (máx. 60 caracteres):</label>
        <input type="text" id="experiencia" name="experiencia" maxlength="60" placeholder="Ex: 29 anos de experiência na área...">

        <button id="submit-button" type="submit">Enviar Cadastro</button>
    </form>
</div>

<script>
    document.getElementById("cadastro-form").addEventListener("submit", function(event) {
        event.preventDefault(); // Impede o envio padrão

        const nome = document.getElementById("nome").value;
        const idade = document.getElementById("idade").value;
        const experiencia = document.getElementById("experiencia").value;
        const phoneNumber = "5585991340658"; // Seu número de WhatsApp

        if (nome && idade && experiencia) {
            const message = `Novo Cadastro de Profissional:\n\n👤 Nome: ${nome}\n🔢 Idade: ${idade} anos\n🛠️ Experiência: ${experiencia}`;
            const encodedMessage = encodeURIComponent(message);
            const whatsappLink = `https://api.whatsapp.com/send?phone=${phoneNumber}&text=${encodedMessage}`;

            window.location.href = whatsappLink; // 🚀 Redireciona automaticamente para seu WhatsApp com a mensagem pronta!
        } else {
            alert("Por favor, preencha todos os campos.");
        }
    });
</script>

</body>
</html>
