<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cadastro de Profissional</title>
    <link rel="stylesheet" href="css/cadastro.css">
    <script src="js/cadastro.js"></script> <!-- Certifique-se de que está aqui! -->

    <meta property="og:title" content="Entre para o time e começe a ter mais clientes.">
    <meta property="og:description" content="Cadastre-se como profissional. Encontre clientes e preencha sua agenda de serviços.">
    <meta property="og:url" content="https://seudominio.com.br/index.html">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://i.imgur.com/0ipoRW1.png">

</head>
<body>

<div class="container">
    <div class="header-container">
        <h1>Cadastro de Profissional</h1>
    </div>

    <form id="cadastro-form">
        <label for="nome">Nome e Sobrenome:</label>
        <input type="text" id="nome" name="nome" required>

        <label for="idade">Idade:</label>
        <input type="number" id="idade" name="idade" required>

        <label for="profissao">Profissão:</label>
        <select id="profissao" name="profissao" required>
            <option value="">Selecione</option>
            <option value="marido-de-aluguel">Marido de Aluguel</option> 
            <option value="arquiteto">Arquiteto(a)</option>
            <option value="pedreiro">Pedreiro</option>
            <option value="servente">Servente</option>
            <option value="bombeiro-hidraulico">Bombeiro Hidráulico</option>
            <option value="metalurgico">Metalúrgico</option>
            <option value="pintor">Pintor</option>
            <option value="capinador">Capinador</option>
            <option value="eletricista">Eletricista</option>
            <option value="vidraceiro">Vidraceiro</option>
            <option value="piscineiro">Piscineiro (Limpador de Piscinas)</option>
            <option value="tecnico-em-refrigeracao">Tec. em Refrigeração</option>
            <option value="tec-de-cercas-eletricas">Tec. de Cerca Elétrica</option>
            <option value="montador-de-moveis">Montador de Móveis</option>
            <option value="marceneiro">Marceneiro</option>
            <option value="mudanças-e-carretos">Mudanças e Carretos</option>
            <option value="ajudante-de-frete">Ajudante de Frete</option> 
            <option value="diarista">Diarista</option>
            <option value="baba">Babá</option>
            <option value="cuidador-de-idosos">Cuidador(a) de Idosos</option>
            <option value="churrasqueiro">Churrasqueiro</option>
            <option value="bartender">Bartender</option>
            <option value="cabeleireiro-a-domicilio">Cabeleireiro a Domicílio</option>
            <option value="manicure-a-domicilio">Manicure a Domicílio</option>
            <option value="designer">Designer</option>
            <option value="fotografo">Fotógrafo(a)</option>
            <option value="dj">DJ</option>
            <option value="adestramento">Adestramento</option>
            <option value="cuidador-de-animais">Cuidador(a) de Animais</option>
            <option value="advogado">Advogado(a)</option>
            <option value="psicologo">Psicólogo(a)</option> 
            <option value="nutricionista">Nutricionista</option>
            <option value="personal-trainer">Personal Trainer</option>
        </select>

        <label for="estado">Estado:</label>
        <select id="estado" name="estado" required>
            <option value="" disabled selected>Selecione o estado</option>
            <option value="12">Acre</option>
            <option value="27">Alagoas</option>
            <option value="16">Amapá</option>
            <option value="13">Amazonas</option>
            <option value="29">Bahia</option>
            <option value="23">Ceará</option>
            <option value="53">Distrito Federal</option>
            <option value="32">Espírito Santo</option>
            <option value="52">Goiás</option>
            <option value="21">Maranhão</option>
            <option value="51">Mato Grosso</option>
            <option value="50">Mato Grosso do Sul</option>
            <option value="31">Minas Gerais</option>
            <option value="15">Pará</option>
            <option value="25">Paraíba</option>
            <option value="41">Paraná</option>
            <option value="26">Pernambuco</option>
            <option value="22">Piauí</option>
            <option value="33">Rio de Janeiro</option>
            <option value="24">Rio Grande do Norte</option>
            <option value="43">Rio Grande do Sul</option>
            <option value="11">Rondônia</option>
            <option value="14">Roraima</option>
            <option value="42">Santa Catarina</option>
            <option value="35">São Paulo</option>
            <option value="28">Sergipe</option>
            <option value="17">Tocantins</option>
        </select>

        <label for="cidade">Cidade:</label>
        <select id="cidade" name="cidade" required>
            <option value="" disabled selected>Selecione a cidade</option>
        </select>

        <label for="experiencia">Experiência (máx. 60 caracteres):</label>
        <input type="text" id="experiencia" name="experiencia" maxlength="60" placeholder="Ex: 29 anos de experiência na área...">

        <button id="submit-button" type="submit">Enviar Cadastro</button>
        <button id="back-button" onclick="window.location.href='index.html'">Voltar</button>
    </form>
</div>

<script src="js/cadastro.js"></script>

</body>
</html>
